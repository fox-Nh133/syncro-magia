<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magia Studio</title>
  <script src="https://unpkg.com/wavesurfer.js@7"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-base:    #08080f;
      --bg-surface: #0d0d18;
      --bg-raised:  #13131f;
      --bg-card:    #1a1a2a;
      --border:     #252535;
      --border-hi:  #3a3a5a;
      --accent:     #7c3aed;
      --accent-hi:  #a78bfa;
      --accent-glow:#7c3aed66;
      --pink:       #ec4899;
      --text:       #d0d0e8;
      --text-muted: #6060a0;
      --red:        #ef4444;
      --dot-off:    #14141e;
    }

    body {
      background: var(--bg-base);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 13px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      z-index: 10;
    }
    header h1 {
      font-size: 1.05rem;
      font-weight: 800;
      background: linear-gradient(120deg, var(--accent-hi), var(--pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.5px;
      margin-right: auto;
      white-space: nowrap;
    }

    /* ── Buttons ── */
    .btn {
      background: var(--bg-raised);
      color: var(--text);
      border: 1px solid var(--border-hi);
      padding: 7px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 500;
      transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
      white-space: nowrap;
    }
    .btn:hover:not(:disabled) {
      background: var(--bg-card);
      border-color: var(--accent);
      box-shadow: 0 0 8px var(--accent-glow);
    }
    .btn.active {
      background: #2d0b6e;
      border-color: var(--accent);
      color: var(--accent-hi);
      box-shadow: 0 0 10px var(--accent-glow);
    }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-danger:hover:not(:disabled) {
      background: #2a0d0d;
      border-color: var(--red);
      box-shadow: 0 0 8px #ef444444;
    }

    /* ── Waveform section ── */
    #waveform-section {
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 18px 6px;
      flex-shrink: 0;
    }
    #waveform { width: 100%; height: 72px; }
    #time-display {
      font-size: 0.72rem;
      color: var(--text-muted);
      text-align: right;
      margin-top: 4px;
      font-variant-numeric: tabular-nums;
      font-family: 'Consolas', 'SF Mono', monospace;
    }

    /* ── Main layout ── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Preview panel ── */
    #preview-panel {
      background: var(--bg-base);
      border-right: 1px solid var(--border);
      padding: 14px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
      width: 296px;
    }
    #preview-panel .panel-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-muted);
      margin-bottom: 12px;
      align-self: flex-start;
    }
    #dot-grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 5px;
      width: 100%;
    }
    .dot {
      aspect-ratio: 1;
      border-radius: 50%;
      background: var(--dot-off);
      border: 1px solid #1e1e2e;
      transition: background-color 0.08s, box-shadow 0.08s;
    }

    /* ── Editor area ── */
    .editor-area {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Keyframe list panel ── */
    #keyframe-panel {
      width: 210px;
      background: var(--bg-surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    #keyframe-panel .panel-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-muted);
      padding: 11px 14px 9px;
      border-bottom: 1px solid var(--border);
    }
    #timeline-controls {
      padding: 9px 10px;
      border-bottom: 1px solid var(--border);
    }
    #add-keyframe-btn { width: 100%; text-align: center; }

    #keyframe-list { overflow-y: auto; flex: 1; }
    .kf-item {
      padding: 9px 12px;
      cursor: pointer;
      border-bottom: 1px solid #0f0f18;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background 0.1s;
    }
    .kf-item:hover { background: var(--bg-raised); }
    .kf-item.selected {
      background: #1a0840;
      border-left: 3px solid var(--accent);
      padding-left: 9px;
    }
    .kf-time {
      color: var(--accent-hi);
      font-weight: 600;
      font-family: 'Consolas', 'SF Mono', monospace;
      font-size: 0.82rem;
    }
    .kf-del {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--red);
      opacity: 0.4;
      font-size: 0.75rem;
      padding: 2px 5px;
      border-radius: 3px;
      transition: opacity 0.15s, background 0.15s;
    }
    .kf-del:hover { opacity: 1; background: #2a1010; }

    /* ── Code editor panel ── */
    #code-panel {
      flex: 1;
      background: #090910;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    #code-panel-header {
      padding: 9px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    #selected-time-label {
      color: var(--accent-hi);
      font-size: 0.8rem;
      font-weight: 600;
      font-family: 'Consolas', 'SF Mono', monospace;
      text-transform: none;
      letter-spacing: 0;
      flex: 1;
      text-align: center;
    }
    #rule-builder-btn { font-size: 0.75rem; padding: 5px 11px; }
    #code-editor {
      flex: 1;
      background: transparent;
      color: #c8d0ff;
      border: none;
      outline: none;
      padding: 16px 18px;
      font-family: 'Fira Code', 'Consolas', 'SF Mono', monospace;
      font-size: 0.88rem;
      line-height: 1.7;
      resize: none;
      tab-size: 2;
    }
    #code-editor::placeholder { color: #2a2a40; }
    #code-editor:disabled { opacity: 0.25; pointer-events: none; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #4a4a7a; }

    /* ── Mobile tab bar ── */
    #mobile-tabs {
      display: none;
      background: var(--bg-surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    #mobile-tabs .tab-bar {
      display: flex;
    }
    #mobile-tabs .tab-btn {
      flex: 1;
      background: none;
      border: none;
      color: var(--text-muted);
      padding: 12px 8px 10px;
      font-size: 0.72rem;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      transition: color 0.15s, background 0.15s;
      border-top: 2px solid transparent;
    }
    #mobile-tabs .tab-btn .tab-icon { font-size: 1.1rem; }
    #mobile-tabs .tab-btn.active {
      color: var(--accent-hi);
      border-top-color: var(--accent);
      background: #1a0840;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      body { font-size: 14px; }

      header { padding: 8px 12px; gap: 6px; flex-wrap: wrap; }
      header h1 { font-size: 0.95rem; }
      .btn { padding: 6px 10px; font-size: 0.75rem; }

      #waveform-section { padding: 8px 10px 4px; }
      #waveform { height: 56px; }

      #mobile-tabs { display: block; }

      .main {
        flex-direction: column;
        overflow: hidden;
      }

      /* On mobile, panels stack and only active one shows */
      #preview-panel {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid var(--border);
        padding: 10px;
        flex-shrink: 0;
        display: none;
      }
      #preview-panel.mobile-active { display: flex; flex: 1; }

      .editor-area { display: contents; }

      #keyframe-panel {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid var(--border);
        display: none;
        flex-shrink: 0;
      }
      #keyframe-panel.mobile-active {
        display: flex;
        flex: 1;
        overflow: hidden;
      }

      #code-panel { display: none; }
      #code-panel.mobile-active { display: flex; flex: 1; }

      /* Dot grid fills nicely on mobile */
      #dot-grid { gap: 4px; }

      /* Code editor font slightly smaller on mobile */
      #code-editor { font-size: 0.82rem; padding: 12px 14px; }
    }

    @media (max-width: 480px) {
      header { gap: 4px; }
      .btn { padding: 5px 8px; font-size: 0.7rem; }
    }

    /* ── Rule Builder Dialog ── */
    #rule-dialog-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #rule-dialog-overlay.open { display: flex; }
    #rule-dialog {
      background: var(--bg-card);
      border: 1px solid var(--border-hi);
      border-radius: 10px;
      padding: 22px 24px 18px;
      width: min(420px, 92vw);
      box-shadow: 0 8px 40px #00000088;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    #rule-dialog h2 {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--accent-hi);
      letter-spacing: 0.5px;
      margin-bottom: 2px;
    }
    .rd-row {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .rd-row label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
    }
    .rd-row select, .rd-row input[type="text"], .rd-row input[type="number"] {
      background: var(--bg-raised);
      color: var(--text);
      border: 1px solid var(--border-hi);
      border-radius: 5px;
      padding: 7px 10px;
      font-size: 0.82rem;
      font-family: inherit;
      outline: none;
      width: 100%;
      transition: border-color 0.15s;
    }
    .rd-row select:focus, .rd-row input:focus {
      border-color: var(--accent);
    }
    .rd-row input[type="color"] {
      width: 44px;
      height: 34px;
      border: 1px solid var(--border-hi);
      border-radius: 5px;
      background: var(--bg-raised);
      cursor: pointer;
      padding: 2px;
    }
    .rd-color-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .rd-color-row input[type="text"] {
      flex: 1;
      font-family: 'Consolas', monospace;
    }
    .rd-sub-params {
      display: flex;
      gap: 8px;
    }
    .rd-sub-params .rd-row { flex: 1; }
    #rd-duration-row { display: none; }
    #rd-fade-row { display: none; }
    .rd-preview-code {
      background: #060610;
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 8px 12px;
      font-family: 'Fira Code', 'Consolas', monospace;
      font-size: 0.8rem;
      color: #c8d0ff;
      white-space: pre-wrap;
      word-break: break-all;
      min-height: 32px;
    }
    .rd-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 4px;
    }
    .rd-actions .btn-insert {
      background: #2d0b6e;
      border-color: var(--accent);
      color: var(--accent-hi);
    }
    .rd-actions .btn-insert:hover {
      background: #3d1090;
      box-shadow: 0 0 10px var(--accent-glow);
    }
  </style>
</head>
<body>

<!-- ═══ Header ═══ -->
<header>
  <h1><i class="bi bi-stars"></i> Magia Studio</h1>
  <button class="btn" id="upload-btn"><i class="bi bi-music-note-beamed"></i> 音源を読み込む</button>
  <input type="file" id="audio-input" accept="audio/*" style="display:none">
  <button class="btn" id="play-btn" disabled><i class="bi bi-play-fill"></i> 再生</button>
  <button class="btn" id="import-btn"><i class="bi bi-upload"></i> JSONインポート</button>
  <input type="file" id="json-input" accept=".json,application/json" style="display:none">
  <button class="btn" id="export-btn"><i class="bi bi-download"></i> JSONエクスポート</button>
</header>

<!-- ═══ Waveform ═══ -->
<div id="waveform-section">
  <div id="waveform"></div>
  <div id="time-display">00:00.00 / 00:00.00</div>
</div>

<!-- ═══ Main ═══ -->
<div class="main">

  <!-- Preview -->
  <div id="preview-panel">
    <div class="panel-label">Preview — 60 Devices (5 × 12)</div>
    <div id="dot-grid"></div>
  </div>

  <!-- Editor -->
  <div class="editor-area">

    <!-- Keyframe list -->
    <div id="keyframe-panel">
      <div class="panel-label">Keyframes</div>
      <div id="timeline-controls">
        <button class="btn" id="add-keyframe-btn" disabled><i class="bi bi-plus-lg"></i> キーフレーム追加</button>
      </div>
      <div id="keyframe-list"></div>
    </div>

    <!-- Code editor -->
    <div id="code-panel">
      <div id="code-panel-header">
        <span>MagiaML Editor</span>
        <span id="selected-time-label">— キーフレームを選択してください</span>
        <button class="btn" id="rule-builder-btn" disabled title="ルールを追加"><i class="bi bi-magic"></i> ルール追加</button>
      </div>
      <textarea id="code-editor"
        placeholder="キーフレームを選択するとここにコードを記述できます。

例:
all { color: #000000; effect: static; }
range(0%, 50%) { color: #7c3aed; effect: wave; duration: 2; }
filter(odd) { color: #ec4899; effect: flash; duration: 0.5; }
index(0) { color: #ffffff; effect: static; }
all { color: #a78bfa; effect: split; duration: 1.5; }
all { color: #ec4899; effect: split-flash; duration: 2; }"
        disabled></textarea>
    </div>

  </div>
</div>

<!-- ═══ Mobile Tab Bar ═══ -->
<div id="mobile-tabs">
  <div class="tab-bar">
    <button class="tab-btn active" data-panel="preview-panel">
      <span class="tab-icon"><i class="bi bi-eye"></i></span>
      <span>プレビュー</span>
    </button>
    <button class="tab-btn" data-panel="keyframe-panel">
      <span class="tab-icon"><i class="bi bi-clock"></i></span>
      <span>キーフレーム</span>
    </button>
    <button class="tab-btn" data-panel="code-panel">
      <span class="tab-icon"><i class="bi bi-pencil"></i></span>
      <span>コード</span>
    </button>
  </div>
</div>

<!-- ═══ Rule Builder Dialog ═══ -->
<div id="rule-dialog-overlay">
  <div id="rule-dialog">
    <h2><i class="bi bi-magic"></i> ルールを追加</h2>

    <!-- Selector -->
    <div class="rd-row">
      <label>セレクタ（対象デバイス）</label>
      <select id="rd-selector">
        <option value="all">all — 全60台</option>
        <option value="range">range() — 範囲指定 (lo%〜hi%)</option>
        <option value="filter-odd">filter(odd) — 奇数番デバイス</option>
        <option value="filter-even">filter(even) — 偶数番デバイス</option>
        <option value="index">index(n) — 1台指定</option>
      </select>
    </div>

    <!-- Selector sub-params -->
    <div id="rd-range-params" class="rd-sub-params" style="display:none">
      <div class="rd-row">
        <label>開始 lo%</label>
        <input type="number" id="rd-range-lo" value="0" min="0" max="100" step="1">
      </div>
      <div class="rd-row">
        <label>終了 hi%</label>
        <input type="number" id="rd-range-hi" value="50" min="0" max="100" step="1">
      </div>
    </div>
    <div id="rd-index-params" style="display:none" class="rd-row">
      <label>インデックス n (0〜59)</label>
      <input type="number" id="rd-index-n" value="0" min="0" max="59" step="1">
    </div>

    <!-- Color -->
    <div class="rd-row">
      <label>カラー</label>
      <div class="rd-color-row">
        <input type="color" id="rd-color-picker" value="#7c3aed">
        <input type="text" id="rd-color-text" value="#7c3aed" maxlength="7" placeholder="#rrggbb">
      </div>
    </div>

    <!-- Effect -->
    <div class="rd-row">
      <label>エフェクト</label>
      <select id="rd-effect">
        <option value="static">static — 常時点灯</option>
        <option value="flash">flash — 短時間フラッシュ (max 0.3s)</option>
        <option value="wave">wave — 左から右へ波</option>
        <option value="wave-reverse">wave-reverse — 右から左へ波</option>
        <option value="split">split — 中央から外側へ広がる</option>
        <option value="split-reverse">split-reverse — 外側から中央へ収束</option>
        <option value="split-flash">split-flash — 中央から広がってフラッシュ</option>
        <option value="split-flash-reverse">split-flash-reverse — 外側から収束してフラッシュ</option>
      </select>
    </div>

    <!-- Duration -->
    <div class="rd-row" id="rd-duration-row">
      <label>duration（秒）</label>
      <input type="number" id="rd-duration" value="1" min="0.1" step="0.1">
    </div>

    <!-- Fade (static only) -->
    <div class="rd-row" id="rd-fade-row">
      <label>fade（秒）</label>
      <input type="number" id="rd-fade" value="0" min="0" step="0.1">
    </div>

    <!-- Preview -->
    <div class="rd-row">
      <label>プレビュー</label>
      <div class="rd-preview-code" id="rd-preview"></div>
    </div>

    <div class="rd-actions">
      <button class="btn" id="rd-cancel-btn">キャンセル</button>
      <button class="btn btn-insert" id="rd-insert-btn"><i class="bi bi-plus-lg"></i> 挿入</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════
// Constants & State
// ════════════════════════════════════════════
const DOT_COUNT = 60;

let wavesurfer  = null;
let audioName   = '';
let keyframes   = [];          // [{ id, time, code }]
let selectedId  = null;
let currentTime = 0;
let rafId       = null;

// ════════════════════════════════════════════
// DOM references
// ════════════════════════════════════════════
const uploadBtn       = document.getElementById('upload-btn');
const audioInput      = document.getElementById('audio-input');
const playBtn         = document.getElementById('play-btn');
const importBtn       = document.getElementById('import-btn');
const jsonInput       = document.getElementById('json-input');
const exportBtn       = document.getElementById('export-btn');
const addKfBtn        = document.getElementById('add-keyframe-btn');
const codeEditor      = document.getElementById('code-editor');
const kfList          = document.getElementById('keyframe-list');
const timeDisplay     = document.getElementById('time-display');
const selectedTimeLbl = document.getElementById('selected-time-label');
const dotGrid         = document.getElementById('dot-grid');

// ════════════════════════════════════════════
// Init dots
// ════════════════════════════════════════════
function initDots() {
  dotGrid.innerHTML = '';
  for (let i = 0; i < DOT_COUNT; i++) {
    const d = document.createElement('div');
    d.className = 'dot';
    d.dataset.idx = i;
    dotGrid.appendChild(d);
  }
}

// ════════════════════════════════════════════
// WaveSurfer
// ════════════════════════════════════════════
function initWaveSurfer(url, name) {
  if (wavesurfer) { wavesurfer.destroy(); wavesurfer = null; }
  audioName = name;

  wavesurfer = WaveSurfer.create({
    container:     '#waveform',
    waveColor:     '#3a3a60',
    progressColor: '#7c3aed',
    cursorColor:   '#a78bfa',
    cursorWidth:   2,
    height:        72,
    normalize:     true,
  });

  wavesurfer.load(url);

  wavesurfer.on('ready', () => {
    playBtn.disabled  = false;
    addKfBtn.disabled = false;
    updateTimeDisplay(0);
  });

  wavesurfer.on('finish', () => {
    playBtn.innerHTML = '<i class="bi bi-play-fill"></i> 再生';
    playBtn.classList.remove('active');
  });
}

// RAF loop — keeps preview in sync during and after playback
function startLoop() {
  cancelAnimationFrame(rafId);
  function tick() {
    if (wavesurfer) {
      const t = wavesurfer.getCurrentTime() || 0;
      if (Math.abs(t - currentTime) > 0.001) {
        currentTime = t;
        updateTimeDisplay(t);
        applyKeyframeAt(t);
      }
    }
    rafId = requestAnimationFrame(tick);
  }
  rafId = requestAnimationFrame(tick);
}

// ════════════════════════════════════════════
// Audio load & playback
// ════════════════════════════════════════════
uploadBtn.addEventListener('click', () => audioInput.click());

audioInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  initWaveSurfer(URL.createObjectURL(file), file.name);
  startLoop();
  playBtn.innerHTML = '<i class="bi bi-play-fill"></i> 再生';
  playBtn.classList.remove('active');
  e.target.value = '';
});

playBtn.addEventListener('click', () => {
  if (!wavesurfer) return;
  wavesurfer.playPause();
  const playing = wavesurfer.isPlaying();
  playBtn.innerHTML = playing ? '<i class="bi bi-stop-fill"></i> 停止' : '<i class="bi bi-play-fill"></i> 再生';
  playBtn.classList.toggle('active', playing);
});

// ════════════════════════════════════════════
// Time formatting
// ════════════════════════════════════════════
function fmtTime(s) {
  if (!isFinite(s) || s < 0) s = 0;
  const m   = Math.floor(s / 60);
  const sec = (s % 60).toFixed(2).padStart(5, '0');
  return `${String(m).padStart(2, '0')}:${sec}`;
}

function updateTimeDisplay(t) {
  const dur = wavesurfer ? (wavesurfer.getDuration() || 0) : 0;
  timeDisplay.textContent = `${fmtTime(t)} / ${fmtTime(dur)}`;
}

// ════════════════════════════════════════════
// Keyframe management
// ════════════════════════════════════════════
function uid() { return '_' + Math.random().toString(36).slice(2, 9); }

addKfBtn.addEventListener('click', () => {
  const t = parseFloat(currentTime.toFixed(3));
  const dup = keyframes.find(k => Math.abs(k.time - t) < 0.05);
  if (dup) { selectKeyframe(dup.id); return; }
  const kf = { id: uid(), time: t, code: '' };
  keyframes.push(kf);
  keyframes.sort((a, b) => a.time - b.time);
  renderKfList();
  selectKeyframe(kf.id);
});

function renderKfList() {
  kfList.innerHTML = '';
  keyframes.forEach(kf => {
    const item = document.createElement('div');
    item.className = 'kf-item' + (kf.id === selectedId ? ' selected' : '');

    const timeSpan = document.createElement('span');
    timeSpan.className = 'kf-time';
    timeSpan.textContent = fmtTime(kf.time);

    const del = document.createElement('button');
    del.className = 'kf-del';
    del.innerHTML = '<i class="bi bi-x"></i>';
    del.title = '削除';
    del.addEventListener('click', e => { e.stopPropagation(); deleteKf(kf.id); });

    item.appendChild(timeSpan);
    item.appendChild(del);
    item.addEventListener('click', () => selectKeyframe(kf.id));
    kfList.appendChild(item);
  });
}

function selectKeyframe(id) {
  // Persist current edits
  if (selectedId) {
    const prev = keyframes.find(k => k.id === selectedId);
    if (prev) prev.code = codeEditor.value;
  }

  selectedId = id;
  const kf = keyframes.find(k => k.id === id);
  if (kf) {
    codeEditor.value    = kf.code;
    codeEditor.disabled = false;
    document.getElementById('rule-builder-btn').disabled = false;
    selectedTimeLbl.textContent = `@ ${fmtTime(kf.time)}`;
    codeEditor.focus();
  } else {
    codeEditor.value    = '';
    codeEditor.disabled = true;
    document.getElementById('rule-builder-btn').disabled = true;
    selectedTimeLbl.textContent = '— キーフレームを選択してください';
  }
  renderKfList();
}

function deleteKf(id) {
  keyframes = keyframes.filter(k => k.id !== id);
  if (selectedId === id) {
    selectedId = null;
    codeEditor.value    = '';
    codeEditor.disabled = true;
    document.getElementById('rule-builder-btn').disabled = true;
    selectedTimeLbl.textContent = '— キーフレームを選択してください';
  }
  renderKfList();
}

codeEditor.addEventListener('input', () => {
  if (selectedId) {
    const kf = keyframes.find(k => k.id === selectedId);
    if (kf) kf.code = codeEditor.value;
  }
});

// ════════════════════════════════════════════
// MagiaML Parser
// ════════════════════════════════════════════

/**
 * Parse MagiaML source code into rule objects.
 * @returns {Array<{target:string, props:{color,effect,duration}}>}
 */
function parseMagiaML(src) {
  const rules = [];
  const ruleRe = /([a-zA-Z]+(?:\([^)]*\))?)\s*\{([^}]*)\}/g;
  let m;
  while ((m = ruleRe.exec(src)) !== null) {
    const target = m[1].trim();
    const body   = m[2];
    const props  = {};
    const propRe = /(\w+)\s*:\s*([^;]+);?/g;
    let pm;
    while ((pm = propRe.exec(body)) !== null) {
      props[pm[1].trim()] = pm[2].trim();
    }
    rules.push({ target, props });
  }
  return rules;
}

/**
 * Resolve a target string to an array of device indices (0-based).
 */
function resolveTarget(target) {
  if (target === 'all') {
    return Array.from({ length: DOT_COUNT }, (_, i) => i);
  }

  const rangeM = target.match(/^range\(\s*(\d+(?:\.\d+)?)%\s*,\s*(\d+(?:\.\d+)?)%\s*\)$/);
  if (rangeM) {
    const lo = parseFloat(rangeM[1]) / 100;
    const hi = parseFloat(rangeM[2]) / 100;
    return Array.from({ length: DOT_COUNT }, (_, i) => i)
      .filter(i => {
        const pos = i / (DOT_COUNT - 1);
        return pos >= lo && pos <= hi;
      });
  }

  const filterM = target.match(/^filter\((odd|even)\)$/);
  if (filterM) {
    const odd = filterM[1] === 'odd';
    // "odd" = devices numbered 1,3,5... = index 0,2,4...
    return Array.from({ length: DOT_COUNT }, (_, i) => i)
      .filter(i => odd ? (i % 2 === 0) : (i % 2 === 1));
  }

  const idxM = target.match(/^index\((\d+)\)$/);
  if (idxM) {
    const n = parseInt(idxM[1]);
    return (n >= 0 && n < DOT_COUNT) ? [n] : [];
  }

  return [];
}

// ════════════════════════════════════════════
// Preview rendering
// ════════════════════════════════════════════

function lerpColor(a, b, t) {
  const ar = parseInt(a.slice(1, 3), 16);
  const ag = parseInt(a.slice(3, 5), 16);
  const ab = parseInt(a.slice(5, 7), 16);
  const br = parseInt(b.slice(1, 3), 16);
  const bg = parseInt(b.slice(3, 5), 16);
  const bb = parseInt(b.slice(5, 7), 16);
  const r  = Math.round(ar + (br - ar) * t);
  const g  = Math.round(ag + (bg - ag) * t);
  const bl = Math.round(ab + (bb - ab) * t);
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${bl.toString(16).padStart(2,'0')}`;
}

function applyKeyframeAt(time) {
  // Collect all keyframes up to `time`, in chronological order
  const active = keyframes
    .filter(k => k.time <= time)
    .sort((a, b) => a.time - b.time);

  // Build per-device state by stacking keyframes (later overrides earlier)
  // state[i] = { color, effect, duration, fade, kfTime }
  const state = Array.from({ length: DOT_COUNT }, () => ({
    color: null, effect: 'static', duration: 1, fade: 0, kfTime: 0,
  }));

  active.forEach(kf => {
    const rules = parseMagiaML(kf.code);
    rules.forEach(rule => {
      const color    = rule.props.color    || '#ffffff';
      const effect   = rule.props.effect   || 'static';
      const duration = parseFloat(rule.props.duration || '1');
      const fade     = parseFloat(rule.props.fade     || '0');
      resolveTarget(rule.target).forEach(i => {
        state[i] = { color, effect, duration, fade, kfTime: kf.time };
      });
    });
  });

  // Compute final display colors
  const colors = state.map((s, i) => {
    if (!s.color) return null;

    const elapsed = time - s.kfTime;

    switch (s.effect) {
      case 'flash': {
        // Visible for first 0.3 s, then off
        const flashDur = Math.min(s.duration, 0.3);
        return elapsed <= flashDur ? s.color : null;
      }
      case 'wave': {
        // Wave front sweeps left→right over `duration` seconds
        // Device i lights when front reaches it, stays lit for 0.4 s
        const dur      = s.duration > 0 ? s.duration : 1;
        const arriveAt = (i / (DOT_COUNT - 1)) * dur;
        const lit      = elapsed >= arriveAt && elapsed <= arriveAt + 0.4;
        return lit ? s.color : null;
      }
      case 'wave-reverse': {
        // Wave front sweeps right→left over `duration` seconds
        const dur      = s.duration > 0 ? s.duration : 1;
        const ratio    = i / (DOT_COUNT - 1);
        const arriveAt = (1 - ratio) * dur;
        const lit      = elapsed >= arriveAt && elapsed <= arriveAt + 0.4;
        return lit ? s.color : null;
      }
      case 'split': {
        // Light spreads outward from center over `duration` seconds, stays lit
        const dur       = s.duration > 0 ? s.duration : 1;
        const center    = (DOT_COUNT - 1) / 2;
        const distNorm  = Math.abs(i - center) / center; // 0=center, 1=edge
        const arriveAt  = distNorm * dur;
        return elapsed >= arriveAt ? s.color : null;
      }
      case 'split-reverse': {
        // Light converges from edges to center over `duration` seconds, stays lit
        const dur       = s.duration > 0 ? s.duration : 1;
        const center    = (DOT_COUNT - 1) / 2;
        const distNorm  = Math.abs(i - center) / center;
        const arriveAt  = (1 - distNorm) * dur;
        return elapsed >= arriveAt ? s.color : null;
      }
      case 'split-flash': {
        // Flash spreads outward from center, each device flashes for 0.3 s
        const dur       = s.duration > 0 ? s.duration : 1;
        const center    = (DOT_COUNT - 1) / 2;
        const distNorm  = Math.abs(i - center) / center;
        const arriveAt  = distNorm * dur;
        const lit       = elapsed >= arriveAt && elapsed <= arriveAt + 0.3;
        return lit ? s.color : null;
      }
      case 'split-flash-reverse': {
        // Flash converges from edges to center, each device flashes for 0.3 s
        const dur       = s.duration > 0 ? s.duration : 1;
        const center    = (DOT_COUNT - 1) / 2;
        const distNorm  = Math.abs(i - center) / center;
        const arriveAt  = (1 - distNorm) * dur;
        const lit       = elapsed >= arriveAt && elapsed <= arriveAt + 0.3;
        return lit ? s.color : null;
      }
      case 'static':
      default: {
        const effectiveFade = Math.min(s.fade ?? 0, s.duration);
        if (elapsed >= s.duration) return null;
        if (effectiveFade > 0) {
          const fadeStart = s.duration - effectiveFade;
          if (elapsed >= fadeStart) {
            const p = (elapsed - fadeStart) / effectiveFade;
            return lerpColor(s.color, '#000000', p);
          }
        }
        return s.color;
      }
    }
  });

  renderDots(colors);
}

function renderDots(colors) {
  const dots = dotGrid.children;
  for (let i = 0; i < DOT_COUNT; i++) {
    const c = colors[i];
    if (c) {
      dots[i].style.backgroundColor = c;
      dots[i].style.boxShadow = `0 0 7px ${c}99`;
    } else {
      dots[i].style.backgroundColor = 'var(--dot-off)';
      dots[i].style.boxShadow = 'none';
    }
  }
}

// ════════════════════════════════════════════
// JSON Import
// ════════════════════════════════════════════
importBtn.addEventListener('click', () => jsonInput.click());

jsonInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!data.keyframes || !Array.isArray(data.keyframes)) throw new Error('Invalid format');

      // Reset editor state
      selectedId = null;
      codeEditor.value    = '';
      codeEditor.disabled = true;
      selectedTimeLbl.textContent = '— キーフレームを選択してください';

      keyframes = data.keyframes.map(k => ({ id: uid(), time: k.time, code: k.code || '' }));
      keyframes.sort((a, b) => a.time - b.time);
      renderKfList();

      if (data.audioName) audioName = data.audioName;
    } catch (err) {
      alert('JSONのインポートに失敗しました: ' + err.message);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

// ════════════════════════════════════════════
// JSON Export
// ════════════════════════════════════════════
exportBtn.addEventListener('click', () => {
  // Flush pending edits
  if (selectedId) {
    const kf = keyframes.find(k => k.id === selectedId);
    if (kf) kf.code = codeEditor.value;
  }

  const payload = {
    audioName: audioName || 'untitled',
    keyframes: keyframes.map(k => ({ time: k.time, code: k.code })),
  };

  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const a    = Object.assign(document.createElement('a'), {
    href:     URL.createObjectURL(blob),
    download: (audioName ? audioName.replace(/\.[^.]+$/, '') : 'magia_studio') + '_show.json',
  });
  a.click();
  URL.revokeObjectURL(a.href);
});

// ════════════════════════════════════════════
// Mobile tab switching
// ════════════════════════════════════════════
const mobilePanels = ['preview-panel', 'keyframe-panel', 'code-panel'];
const tabBtns = document.querySelectorAll('#mobile-tabs .tab-btn');

function isMobile() { return window.innerWidth <= 768; }

function activateMobilePanel(panelId) {
  mobilePanels.forEach(id => {
    document.getElementById(id).classList.toggle('mobile-active', id === panelId);
  });
  tabBtns.forEach(btn => {
    btn.classList.toggle('active', btn.dataset.panel === panelId);
  });
}

tabBtns.forEach(btn => {
  btn.addEventListener('click', () => activateMobilePanel(btn.dataset.panel));
});

// When switching to code panel on mobile, focus editor if a keyframe is selected
document.querySelector('[data-panel="code-panel"]').addEventListener('click', () => {
  if (isMobile() && !codeEditor.disabled) codeEditor.focus();
});

// ════════════════════════════════════════════
// Rule Builder Dialog
// ════════════════════════════════════════════
const ruleBuilderBtn   = document.getElementById('rule-builder-btn');
const rdOverlay        = document.getElementById('rule-dialog-overlay');
const rdSelector       = document.getElementById('rd-selector');
const rdRangeParams    = document.getElementById('rd-range-params');
const rdIndexParams    = document.getElementById('rd-index-params');
const rdRangeLo        = document.getElementById('rd-range-lo');
const rdRangeHi        = document.getElementById('rd-range-hi');
const rdIndexN         = document.getElementById('rd-index-n');
const rdColorPicker    = document.getElementById('rd-color-picker');
const rdColorText      = document.getElementById('rd-color-text');
const rdEffect         = document.getElementById('rd-effect');
const rdDurationRow    = document.getElementById('rd-duration-row');
const rdDuration       = document.getElementById('rd-duration');
const rdFadeRow        = document.getElementById('rd-fade-row');
const rdFade           = document.getElementById('rd-fade');
const rdPreview        = document.getElementById('rd-preview');
const rdCancelBtn      = document.getElementById('rd-cancel-btn');
const rdInsertBtn      = document.getElementById('rd-insert-btn');

function buildRuleCode() {
  // Selector
  let selector;
  switch (rdSelector.value) {
    case 'range':
      selector = `range(${rdRangeLo.value}%, ${rdRangeHi.value}%)`;
      break;
    case 'filter-odd':
      selector = 'filter(odd)';
      break;
    case 'filter-even':
      selector = 'filter(even)';
      break;
    case 'index':
      selector = `index(${rdIndexN.value})`;
      break;
    default:
      selector = 'all';
  }

  const color  = rdColorText.value || '#ffffff';
  const effect = rdEffect.value;
  const dur    = parseFloat(rdDuration.value) || 1;
  const fade   = parseFloat(rdFade.value) || 0;

  let props = `color: ${color}; effect: ${effect};`;
  props += ` duration: ${dur};`;
  if (effect === 'static' && fade > 0) props += ` fade: ${fade};`;

  return `${selector} { ${props} }`;
}

function updateRdUi() {
  const sel = rdSelector.value;
  rdRangeParams.style.display = sel === 'range' ? 'flex' : 'none';
  rdIndexParams.style.display = sel === 'index' ? 'flex' : 'none';

  const isStatic = rdEffect.value === 'static';
  rdDurationRow.style.display = 'flex';
  rdFadeRow.style.display     = isStatic ? 'flex' : 'none';

  rdPreview.textContent = buildRuleCode();
}

rdSelector.addEventListener('change', updateRdUi);
rdEffect.addEventListener('change', updateRdUi);
rdRangeLo.addEventListener('input', updateRdUi);
rdRangeHi.addEventListener('input', updateRdUi);
rdIndexN.addEventListener('input', updateRdUi);
rdDuration.addEventListener('input', updateRdUi);
rdFade.addEventListener('input', updateRdUi);

rdColorPicker.addEventListener('input', () => {
  rdColorText.value = rdColorPicker.value;
  updateRdUi();
});
rdColorText.addEventListener('input', () => {
  // Sync picker if valid hex
  if (/^#[0-9a-fA-F]{6}$/.test(rdColorText.value)) {
    rdColorPicker.value = rdColorText.value;
  }
  updateRdUi();
});

ruleBuilderBtn.addEventListener('click', () => {
  updateRdUi();
  rdOverlay.classList.add('open');
});

rdCancelBtn.addEventListener('click', () => rdOverlay.classList.remove('open'));
rdOverlay.addEventListener('click', e => { if (e.target === rdOverlay) rdOverlay.classList.remove('open'); });

rdInsertBtn.addEventListener('click', () => {
  const code = buildRuleCode();
  // Insert at cursor or append
  const start = codeEditor.selectionStart;
  const end   = codeEditor.selectionEnd;
  const val   = codeEditor.value;
  const prefix = val.length > 0 && !val.endsWith('\n') ? '\n' : '';
  const insertion = prefix + code + '\n';
  codeEditor.value = val.slice(0, start) + insertion + val.slice(end);
  // Move cursor after inserted text
  const newPos = start + insertion.length;
  codeEditor.selectionStart = codeEditor.selectionEnd = newPos;
  codeEditor.focus();
  // Sync to keyframe data
  if (selectedId) {
    const kf = keyframes.find(k => k.id === selectedId);
    if (kf) kf.code = codeEditor.value;
  }
  rdOverlay.classList.remove('open');
});

// ════════════════════════════════════════════
// Boot
// ════════════════════════════════════════════
initDots();
startLoop();

// Default: load audio.mp3 if available
fetch('audio.mp3', { method: 'HEAD' })
  .then(r => { if (r.ok) { initWaveSurfer('audio.mp3', 'audio.mp3'); } })
  .catch(() => {});

// Init mobile panel (show preview by default)
activateMobilePanel('preview-panel');
</script>
